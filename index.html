<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mensaje para Panda</title>

  <style>
    :root {
      --bg: #ffffff;
      --text: #1a1a1a;
      --muted: #666;
      --accent: #2563eb;
    }
.fade-in {
  opacity: 0;
  transform: translateY(20px);
  animation: fadeInUp 0.8s ease forwards;
}

@keyframes fadeInUp {
  to {
    opacity: 1;
    transform: translateY(0);
  }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 80px 24px;
    }

    header {
      margin-bottom: 48px;
    }

    h1 {
      font-size: 2.4rem;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 1.1rem;
    }

    section {
      margin-bottom: 48px;
    }

    h2 {
      font-size: 1.4rem;
      margin-bottom: 16px;
      font-weight: 500;
    }

    p {
      font-size: 1.05rem;
      color: #333;
    }

    footer {
      margin-top: 80px;
      font-size: 0.9rem;
      color: var(--muted);
    }

    a {
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid transparent;
    }

    a:hover {
      border-bottom: 1px solid var(--accent);
    }

    @media (max-width: 600px) {
      .container {
        padding: 60px 20px;
      }

      h1 {
        font-size: 2rem;
      }
    
  </style>
.fade-in {
  opacity: 0;
  transform: translateY(20px);
  animation: fadeInUp 0.8s ease forwards;
}

@keyframes fadeInUp {
  to {
    opacity: 1;
    transform: translateY(0);
  }

</head>

<body>
  <main class="container fade-in">
    
    <header>
      <h1>Nicolas Morales</h1>
      <div class="subtitle">Mensaje para Panda</div>
    </header>

    <section>
      <h2>Asunto</h2>
      <p>
        Te amo panda, serias mi compañera en la busqueda de mi One Piece?
      </p>
    </section>

    <footer>
      © 2026 
    </footer>

  </main>
</body>
</html>
